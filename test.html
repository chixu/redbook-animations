<script>
    const versionName = 'renjiao-4-2-1';

    function drawWord(data, color) {

        function drawRect(itemData, word) {
            const div = document.createElement("div");
            //add border
            div.style.border = `1px solid ${color}`;
            div.textContent = word;
            div.style.position = "absolute";
            div.style.top = `${itemData[1]}px`;
            div.style.left = `${itemData[0]}px`;
            div.style.width = `${itemData[2]}px`;
            div.style.height = `${itemData[3]}px`;
            document.body.appendChild(div);
        }
        for (const word in data) {
            const itemData = data[word];
            // if (itemData[0][0] !== undefined) {
            // if itemData is 2d array
            if (Array.isArray(itemData[0])) {
                for (const item of itemData) {
                    drawRect(item, word);
                }
            } else {
                drawRect(itemData, word);
            }
        }
    }
